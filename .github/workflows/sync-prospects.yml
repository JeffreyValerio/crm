name: Sync Prospects

on:
  schedule:
    - cron: '0 12 * * *'  # 6:00am CST (UTC-6) daily
  workflow_dispatch:       # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_SSL: ${{ secrets.DATABASE_SSL }}
      DATABASE_SSL_REJECT_UNAUTHORIZED: 'false'
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      CI: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run scraper
        run: node scripts/scraper.js

      - name: Import prospects to DB
        run: npm run prospects:import

      - name: Limpiar sin cobertura
        run: npm run prospects:limpiar -- --ejecutar

      - name: Enviar email de resumen
        run: npx tsx scripts/notify-sync.ts
